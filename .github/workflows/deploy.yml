name: Deploy to AWS ECS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t flatris .

      - name: Tag Docker image
        run: |
          docker tag flatris:latest 203977009278.dkr.ecr.us-east-1.amazonaws.com/flatris:latest

      - name: Push Docker image to ECR
        run: |
          docker push 203977009278.dkr.ecr.us-east-1.amazonaws.com/flatris:latest

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster flatris-cluster-2 \
            --service flatris-task-service-ent2yyhs \
            --force-new-deployment